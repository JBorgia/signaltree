name: GitHub Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release tag format
        run: |
          if [[ "${GITHUB_REF_NAME}" != v* ]]; then
            echo "Expected a version tag like v8.0.2, got: ${GITHUB_REF_NAME}"
            exit 1
          fi
          echo "Creating GitHub release for ${GITHUB_REF_NAME}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
