<section class="doc">
  <header>
    <h2>Signals — Fundamentals</h2>
    <p class="lead">
      Minimal, focused examples demonstrating <strong>signal()</strong> basics
      and UI reactivity.
    </p>
  </header>

  <div class="grid">
    <st-example
      heading="Basic Counter"
      intro="The smallest possible signal + updater pattern."
      [code]="counterCode"
    >
      <div class="badges">
        <span class="badge">#signals</span
        ><span class="badge">#state-management</span
        ><span class="badge">#basic</span>
      </div>
      <div class="controls">
        <button class="btn" (click)="dec()">−</button>
        <span class="stat">{{ count() }}</span>
        <button class="btn" (click)="inc()">＋</button>
        <button class="btn" (click)="reset()">Reset</button>
      </div>
    </st-example>

    <st-example
      heading="Reactive Form Control"
      intro="Bind an input to a signal and derive a greeting."
      [code]="greetingCode"
    >
      <div class="badges">
        <span class="badge">#signals</span><span class="badge">#forms</span>
      </div>
      <div class="controls">
        <input
          placeholder="Type your name…"
          [ngModel]="name()"
          (ngModelChange)="name.set($event)"
        />
        <span>{{ greeting() }}</span>
      </div>
    </st-example>
  </div>
</section>
